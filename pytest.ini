[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    -ra
    --cov=gaming_hub
    --cov-report=term-missing
    --cov-report=xml
    --cov-report=html
filterwarnings =
    error
    ignore::UserWarning
    ignore:.*audioop.*:DeprecationWarning
markers =
    unit: Unit tests (fast, isolated, no I/O).
    integration: Integration tests (may require external services or Docker).
    slow: Tests that take longer than one second.
    network: Tests performing real network requests.
